name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Deploy to VPS
      if: github.ref == 'refs/heads/main'
      uses: appleboy/ssh-action@master
      with:
        # Minimal secret: SSH key for deployment only
        # All other secrets (API keys, tokens) stored on VPS in .env.local
        host: 72.61.214.89
        username: root
        key: ${{ secrets.VPS_DEPLOY_KEY }}
        script: |
          echo "========================================"
          echo "🚀 CLAW PROFIT HUNTER - Auto Deploy"
          echo "========================================"
          echo ""
          
          cd /root/trading-bot
          
          # Backup
          echo "📦 Creating backup..."
          tar -czf archive/backup-$(date +%Y%m%d-%H%M%S).tar.gz src/ config/ bok/ 2>/dev/null || true
          
          # Pull latest
          echo "📥 Pulling latest changes..."
          git fetch origin
          git reset --hard origin/main
          
          # Install dependencies
          echo "📦 Installing dependencies..."
          npm install
          
          # Validate
          echo "🔍 Validating..."
          node -c src/live-trader-v4.2.js
          node -c src/soul-core-paper-trader-v5.js
          
          # Restart services
          echo "🔄 Restarting services..."
          pm2 restart live-trader 2>/dev/null || echo "ℹ️ Live Trader not running"
          pm2 restart paper-trader 2>/dev/null || echo "ℹ️ Paper Trader not running"
          pm2 restart balance-guardian 2>/dev/null || echo "ℹ️ Guardian not running"
          
          echo ""
          echo "========================================"
          echo "✅ Deploy Complete!"
          echo "========================================"
          echo "Timestamp: $(date)"
          echo "Commit: ${{ github.sha }}"
          
    - name: Notify Telegram
      if: always()
      uses: appleboy/telegram-action@master
      with:
        # Telegram config read from VPS .env.local
        # Hardcoded here for notification only
        to: -1003212463774
        token: 8440050300:AAFONxv0lMjl9Os_pIdn8bdf4uFgiBod8zU
        message: |
          🚀 CLAW PROFIT HUNTER - Deploy ${{ job.status }}
          
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
